Behaviors:
  Robot:
    Sensors:
      Cameras:
        Camera_0:
          Name: "camera_0"
          Topic: "/carla/ego_vehicle/rgb_front/image"
        Camera_1:
          Name: "camera_1"
          Topic: "/carla/ego_vehicle/rgb_view/image"
        Camera_2:
          Name: "camera_2"
          Topic: "/carla/ego_vehicle/semantic_segmentation_front/image"
          Camera_3:
              Name: 'camera_3'
              Topic: '/carla/ego_vehicle/dvs_front/image'
      Pose3D:
        Pose3D_0:
          Name: "pose3d_0"
          Topic: "/carla/ego_vehicle/odometry"
      BirdEyeView:
        BirdEyeView_0:
          Name: "bird_eye_view_0"
          Topic: ""
      Speedometer:
        Speedometer_0:
          Name: "speedometer_0"
          Topic: "/carla/ego_vehicle/speedometer"
    Actuators:
      CARLA_Motors:
        Motors_0:
          Name: "motors_0"
          Topic: "/carla/ego_vehicle/vehicle_control_cmd"
          MaxV: 3
          MaxW: 0.3
          # MaxV: 7
          # MaxW: 0.8
    BrainPath: ["brains/CARLA/brain_modifiedDeepestLSTM.py"]
    # BrainPath: 'brains/CARLA/brain_pilotnet.py'
    PilotTimeCycle: 20 # 10 ms se usa actualmente
    AsyncMode: False
    Parameters:
      # Model: 'resnet18_control_manual.onnx'
      # Model: 'resnet_dagger.onnx'
      # Model: 'efficientnet_dagger.onnx'
      Model: ["efficientnet_control_manual.onnx"]
      # Model: 'efficientnet_CM_dagger.onnx'
      # Model: 'efficientnet_curva.onnx'
      # Model: 'pilotnet_control_manual.onnx'
      # Model: 'pilotnet_burbuja.onnx'
      ImageCropped: False
      ImageSize: [200, 66]
      # ImageSize: [800, 600]
      ImageNormalized: False
      PredictionsNormalized: False
      GPU: True
      UseOptimized: True
      ImageTranform: ""
    Type: "CARLA"
  Experiment:
    Name: "Experiment name"
    Description: ["Experiment description"]
    UseWorldTimeouts: True
    Timeout: [25] # for each world!
    Repetitions: 5
  
  Simulation:
    Task: "follow_route"
    TestSuite: 'Town02_two_turns'
    RandomizeRoutes: False
    NumRoutes: 2
    RandomSpawnPoint: False
    # World: [configs/CARLA/CARLA_launch_files/test_suite_template.launch.py]
    World: [configs/CARLA/CARLA_launch_files/town02_cannonical_test.launch.py]
    # WaypointPublisher: configs/CARLA/CARLA_launch_files/carla_waypoint_publisher.launch.py
    RandomSpawnPoint: False
    SpawnPoints: '100.0, 2.0, 1.37, 0.0, 0.0, 180.0'
  Dataset:
    In: "/tmp/my_bag.bag"
    Out: ""
  Stats:
    Out: "./"
    PerfectLap: "./perfect_bags/lap-simple-circuit.bag"
  Layout:
    Frame_0:
      Name: frame_0
      Geometry: [1, 1, 1, 1]
      Data: rgbimage
    Frame_1:
      Name: frame_1
      Geometry: [0, 1, 1, 1]
      Data: rgbimage
    Frame_2:
      Name: frame_2
      Geometry: [0, 2, 1, 1]
      Data: rgbimage
    Frame_3:
      Name: frame_3
      Geometry: [1, 2, 1, 1]
      Data: rgbimage
