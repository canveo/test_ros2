Behaviors:
    Robot:
        Name: 'ego_vehicle'
        Model: 'mercedes.coupe_2020'
        Sensors:
            Cameras:
                Camera_0:
                    Name: 'camera_0'
                    Type: 'rgb'
                    Topic: 'Front'
                    Position: '1.5 0 2.4 0 0 0'
            Pose3D:
                Pose3D_0:
                    Name: 'pose3d_0'
                    Topic: '/carla/ego_vehicle/odometry'
            BirdEyeView:
                BirdEyeView_0:
                    Name: 'bird_eye_view_0'
                    Topic: ''
        Actuators:
            CARLA_Motors:
                Motors_0:
                    Name: 'motors_0'
                    Topic: ''
                    MaxV: 3
                    MaxW: 0.3
        InitPosition: '262.6 331.0 1.0 0.0 0.0 0.0'
        BrainPath: 'brains/CARLA/brain_carla_front_image_api.py'
        PilotTimeCycle: 20 # Turn up to reduce number of control decisions
        AsyncMode: True # Set to False to control simulator time
        Parameters:
            Model: ''
            ModelName: 'pilotnet'
            SavedModelPath: '/home/alex/TFM-CARLA-imitation-learning/pytorch_train/experiments/exp_random/trained_models/pilotnet_model_123.pth'
            ImageCropped: True
            ImageSize: [66, 200]
            ImageNormalized: True
            PredictionsNormalized: True
            GPU: True
            UseOptimized: False
            ImageTransform: ''
        Type: 'CARLA'
    Simulation:
        World: configs/CARLA/default_carla_front_image_api.yml
        Map: 'Town01'
        RandomSpawnPoint: False
    Dataset:
        In: '/tmp/my_bag'
        Out: ''
    Stats:
        Out: './'
        PerfectLap: './perfect_bags/lap-simple-circuit/'
    Layout:
        Frame_0:
            Name: frame_0
            Geometry: [1, 1, 1, 1]
            Data: rgbimage
        Frame_1:
            Name: frame_1
            Geometry: [0, 1, 1, 1]
            Data: rgbimage
        Frame_2:
            Name: frame_2
            Geometry: [0, 2, 1, 1]
            Data: rgbimage
        Frame_3:
            Name: frame_3
            Geometry: [1, 2, 1, 1]
            Data: rgbimage         
